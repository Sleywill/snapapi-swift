name: Swift CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-macos:
    name: Build & Test (macOS)
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        # Select the latest installed Xcode 16.x. Falls back to the runner default
        # if no exact Xcode_16.x.app path is found, so the step never hard-fails
        # on runner updates (e.g. Xcode_16.2.app, Xcode_16.3.app, ...).
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$XCODE_PATH" ]; then
            sudo xcode-select -s "$XCODE_PATH"
          else
            echo "No Xcode 16.x found — using runner default"
          fi

      - name: Swift version
        run: swift --version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build (debug)
        run: swift build

      - name: Build (release)
        run: swift build -c release

      - name: Test
        run: swift test
